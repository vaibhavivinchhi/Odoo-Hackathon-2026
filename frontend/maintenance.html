<!DOCTYPE html>
<html>
<head>
	<meta charset='UTF-8'>
	<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>TransitOps - Maintenance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#2563eb,#0f172a);
    min-height:100vh;
    color:white;
}

/* Sidebar */

.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:230px;
    height:100vh;
    background:linear-gradient(180deg,#2563eb,#0f172a);
    padding:25px;
    box-shadow:5px 0 20px rgba(0,0,0,.4);
}

.sidebar h3{
    color:#fff;
    font-size:30px;
    font-weight:700;
    text-align:center;
    margin-bottom:35px;
    padding-bottom:15px;
    border-bottom:1px solid rgba(255,255,255,.2);
}

.sidebar a{
    display:block;
    color:#fff;
    text-decoration:none;
    padding:14px 18px;
    margin:10px 0;
    border-radius:12px;
    font-size:16px;
    transition:.3s;
}

.sidebar a:hover{
    background:rgba(255,255,255,.15);
    transform:translateX(6px);
}

.sidebar a.active{
    background:#fff;
    color:#2563eb;
    font-weight:600;
}

/* Content */

.content{
    margin-left:250px;
    padding:30px;
}

.content h2{
    color:white;
    font-weight:700;
}

/* Cards */

.card{
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(12px);
    border:none;
    border-radius:15px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

/* Table */

.table{
    color:white;
}

.table thead th{
    background:#1d4ed8;
    color:white;
    border:none;
}

.table tbody td{
    background:transparent;
    color:white;
    border-color:rgba(255,255,255,.15);
}

.table tbody tr:hover{
    background:rgba(255,255,255,.08);
}

/* Inputs */

.form-control,
.form-select{
    background:rgba(255,255,255,.15);
    color:white;
    border:none;
    border-radius:10px;
}

.form-control::placeholder{
    color:#ddd;
}

.form-control:focus,
.form-select:focus{
    background:rgba(255,255,255,.25);
    color:white;
    box-shadow:none;
}

.form-select option{
    color:black;
}

/* Buttons */

.btn-primary{
    background:#2563eb;
    border:none;
    border-radius:10px;
}

.btn-primary:hover{
    background:#1d4ed8;
}

.btn-success{
    background:#10b981;
    border:none;
    border-radius:10px;
}

.btn-success:hover{
    background:#059669;
}

/* Modal */

.modal-content{
    background:#0f172a;
    color:white;
    border-radius:15px;
}

.modal-header,
.modal-footer{
    border-color:rgba(255,255,255,.15);
}

.btn-close{
    filter:invert(1);
}

</style>
</head>
<body>
<div class="sidebar"><h3>🚛 TransitOps</h3>
<a href="dashboard.html">Dashboard</a><a href="vehicles.html">Vehicles</a>
<a href="drivers.html">Drivers</a><a href="trip_management.html">Trips</a>
<a href="maintenance.html">Maintenance</a>
<a href="fuel_expense.html">Fuel Expense</a>
</div>
<div class="content">
<div class="d-flex justify-content-between mb-3">
	<h2>Maintenance</h2>
	<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#m">+ New Record</button>
</div>
<div class="card p-3 mb-3">
	<input id="search" class="form-control" placeholder="Search vehicle">
</div>
<div class="card p-3"><table class="table" id="tbl">
	<thead>
		<tr>
			<th>ID</th>
			<th>Vehicle</th>
			<th>Service</th>
			<th>Date</th>
			<th>Cost</th>
			<th>Status</th>
		</tr>
	</thead>
</table></div></div>
<div class="modal fade" id="m"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>New Maintenance</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body">
<input id="id" class="form-control mb-2" placeholder="Record ID">
<input id="veh" class="form-control mb-2" placeholder="Vehicle">
<input id="srv" class="form-control mb-2" placeholder="Service">
<input id="dt" type="date" class="form-control mb-2">
<input id="cost" class="form-control mb-2" placeholder="Cost">
<select id="st" class="form-select"><option>Open</option><option>Closed</option></select>
</div><div class="modal-footer"><button class="btn btn-success" onclick="add()" data-bs-dismiss="modal">Save</button></div></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function add(){let r=document.querySelector("#tbl tbody").insertRow();r.innerHTML=`<td>${id.value}</td><td>${veh.value}</td><td>${srv.value}</td><td>${dt.value}</td><td>${cost.value}</td><td>${st.value}</td>`;}
search.onkeyup=function(){let v=this.value.toLowerCase();document.querySelectorAll("#tbl tbody tr").forEach(tr=>tr.style.display=tr.innerText.toLowerCase().includes(v)?"":"none");}
</script></body></html>
