<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransitOps - Trip Management</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#2563eb,#0f172a);
    min-height:100vh;
    color:#fff;
}

/* Background */

.bg-circle{
    position:fixed;
    width:350px;
    height:350px;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    filter:blur(10px);
    z-index:-1;
}

.circle1{
    top:-120px;
    left:-120px;
}

.circle2{
    bottom:-120px;
    right:-120px;
}

/* Sidebar */

.sidebar{
    position:fixed;
    left:20px;
    top:20px;
    width:240px;
    height:calc(100vh - 40px);
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:20px;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.sidebar h3{
    text-align:center;
    margin-bottom:25px;
    font-weight:700;
    color:#fff;
}

.sidebar a{
    display:block;
    color:#fff;
    text-decoration:none;
    padding:12px 15px;
    border-radius:12px;
    margin-bottom:10px;
    transition:.3s;
}

.sidebar a i{
    width:22px;
}

.sidebar a:hover,
.sidebar a.active{
    background:#10b981;
    transform:translateX(5px);
}


/* Content */

.content{
    margin-left:250px;
    padding:30px;
}


/* Cards */

.card{
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(12px);
    border:none;
    border-radius:15px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

/* Form */

.form-control,
.form-select{
    background:rgba(255,255,255,.15);
    border:none;
    color:#fff;
    border-radius:10px;
    height:48px;
}

.form-control::placeholder{
    color:#ddd;
}

.form-control:focus,
.form-select:focus{
    background:rgba(255,255,255,.25);
    color:#fff;
    box-shadow:none;
}

.form-select option{
    color:#000;
}

/* Form */

.form-control,
.form-select{
    background:rgba(255,255,255,.15);
    border:none;
    color:#fff;
    border-radius:10px;
    height:48px;
}

.form-control::placeholder{
    color:#ddd;
}

.form-control:focus,
.form-select:focus{
    background:rgba(255,255,255,.25);
    color:#fff;
    box-shadow:none;
}

.form-select option{
    color:#000;
}

.table{
    color:#fff;
    margin-bottom:0;
}

.table thead{
    background:rgba(255,255,255,.15);
}

.table thead th{
    color:#fff;
    border:none;
    background:transparent;
}

.table tbody td{
    color:#fff;
    border-color:rgba(255,255,255,.12);
}

.table-hover tbody tr:hover{
    background:rgba(255,255,255,.08);
}


/* Buttons */

.btn-primary{
    background:#10b981;
    border:none;
    border-radius:10px;
    font-weight:600;
    transition:.3s;
}

.btn-primary:hover{
    background:#059669;
    transform:translateY(-2px);
}

.btn-success{
    background:#10b981;
    border:none;
    border-radius:10px;
    font-weight:600;
}

.btn-success:hover{
    background:#059669;
}

/* Premium Modal */

.modal-dialog{
    max-width:650px;
}

.modal-content{
    background:rgba(15,23,42,.95);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.12);
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.45);
    color:#fff;
}

.modal-header{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    border-bottom:none;
    color:#fff;
    padding:18px 25px;
}

.modal-header h5{
    font-size:22px;
    font-weight:600;
}

.modal-body{
    padding:30px;
}

.modal-body label{
    color:#fff;
    font-weight:500;
    margin-bottom:8px;
}

.modal-body .form-control,
.modal-body .form-select{
    height:52px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
    color:#fff;
    border-radius:12px;
    padding:0 15px;
    transition:.3s;
}

.modal-body .form-control::placeholder{
    color:#cbd5e1;
}

.modal-body .form-control:focus,
.modal-body .form-select:focus{
    background:rgba(255,255,255,.15);
    border-color:#10b981;
    box-shadow:0 0 12px rgba(16,185,129,.4);
}

.modal-body .form-select option{
    color:#000;
}

.modal-footer{
    border-top:1px solid rgba(255,255,255,.08);
    padding:18px 25px;
}

.btn-close{
    filter:invert(1);
}

/* Responsive */

@media(max-width:768px){

.sidebar{
    position:relative;
    width:100%;
    height:auto;
    left:0;
    top:0;
    border-radius:0;
}

.content{
    margin-left:0;
    padding:20px;
}

}

</style>
</head>
<body>
    <div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>
<div class="sidebar">
<h3>🚛 TransitOps</h3>

<a href="dashboard.html"><i class="fa fa-chart-line"></i> Dashboard</a>

<a href="vehicles.html"><i class="fa fa-truck"></i> Vehicles</a>

<a href="drivers.html"><i class="fa fa-user"></i> Drivers</a>

<a href="trip_management.html"><i class="fa fa-route"></i> Trips</a>

<a href="maintenance.html"><i class="fa fa-tools"></i> Maintenance</a>

<a href="fuel_expense.html"><i class="fa fa-gas-pump"></i> Fuel Expenses</a>

<a href="reports.html"><i class="fa fa-money-bill"></i> Reports</a>
</div>

<div class="content">
<div class="d-flex justify-content-between align-items-center mb-3">
<h2>Trip Management</h2>
<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#tripModal">
<i class="fa fa-plus"></i> Create Trip
</button>
</div>

<div class="card p-3 mb-3">
<div class="row g-2">
<div class="col-md-4"><input id="search" class="form-control" placeholder="Search destination or vehicle"></div>
<div class="col-md-3">
<select id="filter" class="form-select">
<option value="">All Status</option>
<option>Draft</option>
<option>Dispatched</option>
<option>Completed</option>
<option>Cancelled</option>
</select>
</div>
</div>
</div>

<div class="card p-3">
<table class="table table-hover" id="tripTable">
<thead>
<tr>
<th>Trip ID</th>
<th>Vehicle</th>
<th>Driver</th>
<th>Source</th>
<th>Destination</th>
<th>Cargo</th>
<th>Status</th>
</tr>
</thead>

</table>
</div>
</div>

<div class="modal fade" id="tripModal">
<div class="modal-dialog modal-lg">
<div class="modal-content">
<div class="modal-header">
<h5>Create Trip</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<div class="row g-2">
<div class="col-md-6"><input id="tripid" class="form-control" placeholder="Trip ID"></div>
<div class="col-md-6"><input id="vehicle" class="form-control" placeholder="Vehicle"></div>
<div class="col-md-6"><input id="driver" class="form-control" placeholder="Driver"></div>
<div class="col-md-6"><input id="cargo" class="form-control" placeholder="Cargo Weight"></div>
<div class="col-md-6"><input id="source" class="form-control" placeholder="Source"></div>
<div class="col-md-6"><input id="destination" class="form-control" placeholder="Destination"></div>
<div class="col-md-12">
<select id="status" class="form-select">
<option>Draft</option>
<option>Dispatched</option>
<option>Completed</option>
<option>Cancelled</option>
</select>
</div>
</div>
</div>
<div class="modal-footer">
<button class="btn btn-success" onclick="addTrip()" data-bs-dismiss="modal">Save Trip</button>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function addTrip(){
const r=document.querySelector("#tripTable tbody").insertRow();
r.innerHTML=`<td>${tripid.value}</td><td>${vehicle.value}</td><td>${driver.value}</td><td>${source.value}</td><td>${destination.value}</td><td>${cargo.value}</td><td>${status.value}</td>`;
}
search.onkeyup=function(){
const v=this.value.toLowerCase();
document.querySelectorAll("#tripTable tbody tr").forEach(tr=>{
tr.style.display=tr.innerText.toLowerCase().includes(v)?"":"none";
});
}
filter.onchange=function(){
const f=this.value;
document.querySelectorAll("#tripTable tbody tr").forEach(tr=>{
tr.style.display=(f==""||tr.cells[6].innerText===f)?"":"none";
});
}
</script>
</body>
</html>
