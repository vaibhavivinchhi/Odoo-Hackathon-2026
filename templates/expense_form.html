{% extends "base.html" %}
{% block title %}Log Expense — TransitOps{% endblock %}
{% block page_title %}Log Expense{% endblock %}
{% block content %}
<div class="panel form-panel">
  <form method="POST">
    <div class="form-grid">
      <div class="form-field">
        <label>Vehicle</label>
        <select name="vehicle_id" class="input" required>
          <option value="">Select vehicle…</option>
          {% for v in vehicles %}
          <option value="{{ v.id }}">{{ v.plate_number }} — {{ v.vehicle_type }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-field">
        <label>Related Trip (optional)</label>
        <select name="trip_id" class="input">
          <option value="">None</option>
          {% for t in trips %}
          <option value="{{ t.id }}">#{{ t.id }} — {{ t.origin }} → {{ t.destination }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-field">
        <label>Category</label>
        <select name="category" class="input" required>
          {% for c in ['fuel','toll','maintenance','other'] %}
          <option value="{{ c }}">{{ c|capitalize }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-field">
        <label>Amount (₹)</label>
        <input type="number" step="0.01" name="amount" class="input" required>
      </div>
      <div class="form-field">
        <label>Liters (if fuel)</label>
        <input type="number" step="0.01" name="liters" class="input">
      </div>
      <div class="form-field">
        <label>Date</label>
        <input type="date" name="expense_date" class="input" required>
      </div>
      <div class="form-field form-field-wide">
        <label>Notes</label>
        <input type="text" name="notes" class="input">
      </div>
    </div>
    <div class="form-actions">
      <a href="{{ url_for('expenses_list') }}" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary">Log Expense</button>
    </div>
  </form>
</div>
{% endblock %}
