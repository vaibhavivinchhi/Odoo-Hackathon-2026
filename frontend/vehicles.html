<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransitOps - Vehicles</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<style>
body{background:#f4f7fb}
.sidebar{width:230px;position:fixed;top:0;left:0;height:100vh;background:#0f172a;color:#fff;padding:20px}
.sidebar a{display:block;color:#fff;text-decoration:none;padding:10px;border-radius:8px;margin:6px 0}
.sidebar a:hover{background:#2563eb}
.content{margin-left:250px;padding:24px}
.card{border:none;border-radius:12px}
</style>
</head>
<body>
<div class="sidebar">
<h3>🚛 TransitOps</h3>
<a href="dashboard.html"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="vehicles.html"><i class="fa fa-truck"></i> Vehicles</a>
<a href="#"><i class="fa fa-user"></i> Drivers</a>
<a href="#"><i class="fa fa-route"></i> Trips</a>
<a href="#"><i class="fa fa-tools"></i> Maintenance</a>
</div>

<div class="content">
<div class="d-flex justify-content-between align-items-center mb-3">
<h2>Vehicle Registry</h2>
<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#vehicleModal">
<i class="fa fa-plus"></i> Add Vehicle
</button>
</div>

<div class="card p-3 mb-3">
<div class="row">
<div class="col-md-4"><input id="search" class="form-control" placeholder="Search vehicle"></div>
<div class="col-md-3">
<select id="filter" class="form-select">
<option value="">All Status</option>
<option>Available</option>
<option>On Trip</option>
<option>In Shop</option>
<option>Retired</option>
</select>
</div>
</div>
</div>

<div class="card p-3">
<table class="table table-hover" id="vehicleTable">
<thead>
<tr>
<th>Registration</th><th>Name</th><th>Type</th><th>Capacity</th><th>Status</th>
</tr>
</thead>
<tbody>
<tr><td>GJ01AB1234</td><td>Van-05</td><td>Van</td><td>500 kg</td><td>Available</td></tr>
<tr><td>GJ05XY8899</td><td>Truck-12</td><td>Truck</td><td>5000 kg</td><td>On Trip</td></tr>
<tr><td>GJ18MN4567</td><td>Mini Van</td><td>Mini</td><td>800 kg</td><td>In Shop</td></tr>
</tbody>
</table>
</div>
</div>

<div class="modal fade" id="vehicleModal">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header"><h5>Add Vehicle</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body">
<input id="reg" class="form-control mb-2" placeholder="Registration">
<input id="name" class="form-control mb-2" placeholder="Vehicle Name">
<input id="type" class="form-control mb-2" placeholder="Type">
<input id="cap" class="form-control mb-2" placeholder="Capacity">
<select id="status" class="form-select">
<option>Available</option>
<option>On Trip</option>
<option>In Shop</option>
<option>Retired</option>
</select>
</div>
<div class="modal-footer">
<button class="btn btn-success" onclick="addVehicle()" data-bs-dismiss="modal">Save</button>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function addVehicle(){
const row=document.querySelector("#vehicleTable tbody").insertRow();
row.innerHTML=`<td>${reg.value}</td><td>${name.value}</td><td>${type.value}</td><td>${cap.value}</td><td>${status.value}</td>`;
}
search.onkeyup=function(){
let v=this.value.toLowerCase();
document.querySelectorAll("#vehicleTable tbody tr").forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(v)?"":"none";
});
}
filter.onchange=function(){
let f=this.value;
document.querySelectorAll("#vehicleTable tbody tr").forEach(r=>{
r.style.display=(f==""||r.cells[4].innerText===f)?"":"none";
});
}
</script>
</body>
</html>
