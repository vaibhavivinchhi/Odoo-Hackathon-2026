<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TransitOps Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{font-family:Poppins,sans-serif}
body{
	margin:0;
	background:linear-gradient(135deg,#2563eb,#0f172a);
	min-height:100vh;
	display:flex;
	align-items:center;
	justify-content:center
}
.wrapper{
	width:980px;
	display:grid;
	grid-template-columns:1fr 1fr;
	background:#fff;
	border-radius:24px;
	overflow:hidden;
	box-shadow:0 20px 50px rgba(0,0,0,.3)
}
.left{
	background:linear-gradient(135deg,#2563eb,#1e40af);
	color:#fff;
	padding:50px;
	display:flex;
	flex-direction:column;
	justify-content:center
}
.left h1{
	font-size:42px;
	font-weight:700
}.left p{
	opacity:.9
}
.right{
	padding:40px
}
.form-control,.form-select{
	border-radius:12px;
	height:48px
}
.btn-main{
	background:#2563eb;
	color:#fff;
	border-radius:12px;
	height:50px
}
.btn-main:hover{
	background:#1d4ed8;
	color:#fff
}
.strength{
	height:8px;
	background:#eee;
	border-radius:8px;
	overflow:hidden
}
.bar{
	height:100%;
	width:0;
	background:#ef4444;
	transition:.3s
}
@media(max-width:900px){.wrapper{grid-template-columns:1fr;width:95%}.left{display:none}}
</style>
</head>
<body>
<div class="wrapper">
<div class="left">
<h1><i class="fa-solid fa-truck-fast"></i> TransitOps</h1>
<h4>Smart Transport Operations</h4>
<p>Create your account to manage vehicles, drivers, trips, maintenance and analytics.</p>
</div>
<div class="right">
<h2>Create Account</h2>
<form id="f">
<div class="row">
<div class="col-md-6 mb-3">
	<label>Name</label>
	<input id="name" class="form-control" required>
</div>
<div class="col-md-6 mb-3">
	<label>Email</label>
	<input id="email" type="email" class="form-control" required>
</div>
<div class="col-md-6 mb-3">
	<label>Phone</label>
	<input class="form-control" required>
</div>
<div class="col-md-6 mb-3">
	<label>Role</label>
	<select class="form-select">
		<option>Fleet Manager</option>
		<option>Driver</option>
		<option>Safety Officer</option>
		<option>Financial Analyst</option>
	</select>
</div>
<div class="col-md-6 mb-3">
	<label>Password</label>
	<input id="p1" type="password" class="form-control" onkeyup="strength()">
</div>
<div class="col-md-6 mb-3">
	<label>Confirm Password</label>
	<input id="p2" type="password" class="form-control">
</div>
<div class="col-12 mb-2">
	<div class="strength">
		<div id="bar" class="bar">
		</div></div></div>
<div class="col-12 form-check mb-3">
	<input class="form-check-input" type="checkbox" required> <label class="form-check-label">I accept Terms & Conditions</label></div>
<div class="col-12">
	<button class="btn btn-main w-100">Register</button>
</div>
</div>
</form>
<div class="text-center mt-3">Already have an account? <a href="login.html">Login</a></div>
</div>
</div>
<script>
function strength(){let p=p1.value,l=p.length,b=document.getElementById('bar');b.style.width=Math.min(l*10,100)+'%';b.style.background=l<6?'#ef4444':l<10?'#f59e0b':'#10b981';}
f.onsubmit=e=>{e.preventDefault();if(p1.value!==p2.value){alert('Passwords do not match');return;}localStorage.setItem('user',JSON.stringify({name:name.value,email:email.value}));alert('Registration successful');location='dashboard.html';}
</script>
</body></html>
